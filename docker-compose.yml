services:
  flickr-mcp:
    build: .
    env_file: .env
    environment:
      - MCP_PORT=8000
    volumes:
      - flickr-creds:/root/.flickr_mcp
      - flickr-data:/app/data
    ports:
      - "8000:8000"

  flickr-mcp-stdio:
    build: .
    env_file: .env
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - flickr-creds:/root/.flickr_mcp
      - flickr-data:/app/data
    stdin_open: true
    profiles: [stdio]

volumes:
  flickr-creds:
  flickr-data:
