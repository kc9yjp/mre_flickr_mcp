services:
  flickr:
    build: .
    entrypoint: ["python", "scripts/flickr.py"]
    env_file: .env
    volumes:
      - flickr-creds:/root/.flickr_mcp
      - ./data:/app/data
      - ./scripts:/app/scripts
    stdin_open: true
    tty: true

  mcp:
    build: .
    env_file: .env
    volumes:
      - flickr-creds:/root/.flickr_mcp
      - ./data:/app/data
      - ./scripts:/app/scripts
    stdin_open: true

volumes:
  flickr-creds:
