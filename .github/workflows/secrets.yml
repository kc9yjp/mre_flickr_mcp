name: Secrets

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday 6am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trufflehog:
    name: Secret scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.3 \
            git file:///repo --fail

  flickr-keys:
    name: Secret scanning (Flickr keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded Flickr keys
        run: |
          # Scan for 32-character hex strings assigned to variables that look like Flickr keys
          # This helps catch keys even if TruffleHog misses them due to verification
          ERRORS=0
          if grep -rE '(api_key|api_secret|oauth_token|oauth_token_secret)\s*=\s*["'\''][a-f0-9]{32}["'\'']' . --exclude-dir=.git --exclude=.github/workflows/secrets.yml; then
            echo "::error::Found hardcoded Flickr-like keys in the codebase!"
            ERRORS=1
          fi
          exit $ERRORS
