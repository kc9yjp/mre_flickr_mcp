name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t flickr-mcp:ci .

      - name: Verify MCP server syntax
        run: docker run --rm flickr-mcp:ci python -m py_compile scripts/flickr_mcp.py && echo "Syntax OK"
