name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday 6am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trivy:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: flickr-mcp:scan

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flickr-mcp:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.3 \
            git file:///repo --fail

      - name: Custom Flickr Key Scan
        run: |
          # Scan for 32-character hex strings assigned to variables that look like Flickr keys
          # This helps catch keys even if TruffleHog misses them due to verification
          ERRORS=0
          if grep -rE '(api_key|api_secret|oauth_token|oauth_token_secret)\s*=\s*["'\''][a-f0-9]{32}["'\'']' . --exclude-dir=.git --exclude=.github/workflows/security.yml; then
            echo "::error::Found hardcoded Flickr-like keys in the codebase!"
            ERRORS=1
          fi
          exit $ERRORS
