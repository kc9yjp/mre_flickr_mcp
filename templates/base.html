<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }} — {{ site_title }}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a href="/" class="title">
    <img src="/static/favicon.svg" alt="" width="22" height="22" class="nav-logo">
    {{ site_title }}
  </a>
  {% if logged_in %}
  <a href="/stats">Stats</a>
  <a href="/sync">Sync</a>
  <a href="/setup">Setup</a>
  <form class="nav-logout" method="POST" action="/logout" onsubmit="return false" data-confirm="Log out of Flickr?">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit" class="nav-logout-btn">Logout</button>
  </form>
  {% endif %}
</nav>
<main>
  {% block content %}{% endblock %}
</main>

<div id="confirm-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <p id="confirm-msg" class="modal-msg"></p>
    <div class="modal-actions">
      <button id="confirm-ok" class="btn">Confirm</button>
      <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</div>
<footer>
  &copy; {{ year }} Eric Wettstein &mdash;
  <a href="{{ github_url }}" target="_blank">GitHub</a> &mdash;
  <a href="{{ flickr_url }}" target="_blank">Flickr</a>
</footer>
<script src="/static/app.js"></script>
</body>
</html>
